# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SHERLOCK — Docker Compose Infrastructure
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: "3.9"

services:
  # ─────────────────── Observability Stack ───────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: sherlock-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=http://localhost/prometheus/"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sherlock-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: sherlock-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=sherlock
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - sherlock-net
    restart: unless-stopped

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: sherlock-datadog
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_CONTAINER_EXCLUDE="name:sherlock-datadog"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"
      - "8125:8125/udp"
    networks:
      - sherlock-net
    restart: unless-stopped

  # ─────────────────── Demo Microservices ───────────────────

  auth-service:
    build:
      context: ./demo-services
      dockerfile: auth-service/Dockerfile
    container_name: sherlock-auth
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=auth-service
      - SERVICE_PORT=8001
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "auth-service"}]'
    depends_on:
      - datadog-agent
    networks:
      - sherlock-net
    restart: unless-stopped

  checkout-service:
    build:
      context: ./demo-services
      dockerfile: checkout-service/Dockerfile
    container_name: sherlock-checkout
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=checkout-service
      - SERVICE_PORT=8002
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - AUTH_SERVICE_URL=http://auth-service:8001
      - PAYMENT_SERVICE_URL=http://payment-service:8004
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "checkout-service"}]'
    depends_on:
      - auth-service
      - payment-service
      - datadog-agent
    networks:
      - sherlock-net
    restart: unless-stopped

  recommendation-service:
    build:
      context: ./demo-services
      dockerfile: recommendation-service/Dockerfile
    container_name: sherlock-recommendation
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=recommendation-service
      - SERVICE_PORT=8003
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "recommendation-service"}]'
    depends_on:
      - datadog-agent
    networks:
      - sherlock-net
    restart: unless-stopped

  payment-service:
    build:
      context: ./demo-services
      dockerfile: payment-service/Dockerfile
    container_name: sherlock-payment
    ports:
      - "8004:8004"
    environment:
      - SERVICE_NAME=payment-service
      - SERVICE_PORT=8004
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "payment-service"}]'
    depends_on:
      - datadog-agent
    networks:
      - sherlock-net
    restart: unless-stopped

  # ─────────────────── SHERLOCK Platform ───────────────────

  backend:
    build:
      context: ./backend
    container_name: sherlock-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROMETHEUS_URL=http://prometheus:9090/prometheus
      - GRAFANA_URL=http://grafana:3000/grafana
    depends_on:
      - prometheus
      - grafana
      - auth-service
      - checkout-service
      - recommendation-service
      - payment-service
    networks:
      - sherlock-net
    restart: unless-stopped

  frontend:
    build:
      context: .
    container_name: sherlock-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=
    depends_on:
      - backend
    networks:
      - sherlock-net
    restart: unless-stopped

  nginx-proxy:
    image: nginx:alpine
    container_name: sherlock-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - grafana
      - prometheus
    networks:
      - sherlock-net
    restart: unless-stopped

networks:
  sherlock-net:
    driver: bridge
